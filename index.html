<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KidsCollab — Submission Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>

  <header>
    <div class="header-inner">
      <div class="wordmark">
        <span class="wordmark-kids">Kids</span><span class="wordmark-collab">Collab</span>
      </div>
      <div class="header-label">Submission Generator <span class="version">v2</span></div>
    </div>
    <div class="header-rule"></div>
  </header>

  <main>
    <div class="layout">

      <!-- LEFT: Form -->
      <div class="form-col">

        <section class="form-section" data-step="1">
          <div class="step-label"><span class="step-num">01</span> Details</div>

          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="The 4th Dimension Adventure" autocomplete="off">
          </div>

          <div class="field">
            <label>Section</label>
            <div class="seg-group" id="section-seg">
              <button class="seg active" data-value="KidsCollab">KidsCollab</button>
              <button class="seg" data-value="KidsPerplex">KidsPerplex</button>
              <button class="seg" data-value="QuizCollab">QuizCollab</button>
              <button class="seg" data-value="ColLabs">ColLabs</button>
            </div>
          </div>

          <div class="field">
            <label>Category</label>
            <div class="chip-group" id="category-chips"></div>
          </div>
        </section>

        <section class="form-section" data-step="2">
          <div class="step-label"><span class="step-num">02</span> Authors</div>

          <div class="field">
            <label for="author-input">Add author <span class="label-hint">first name + last initial, e.g. Nathan W</span></label>
            <div class="author-input-row">
              <input type="text" id="author-input" placeholder="e.g. Nathan W" autocomplete="off">
              <button class="add-btn" id="add-author-btn" aria-label="Add author">+</button>
            </div>
          </div>

          <div class="author-tags" id="author-tags"></div>
        </section>

        <section class="form-section" data-step="3">
          <div class="step-label"><span class="step-num">03</span> Flags</div>
          <div class="chip-group" id="flag-chips">
            <button class="chip" data-value="draft" data-field="draft">Draft</button>
            <button class="chip" data-value="featured" data-field="extra">Featured</button>
            <button class="chip" data-value="collab" data-field="extra">Collab</button>
          </div>
        </section>

        <section class="form-section" data-step="4">
          <div class="step-label"><span class="step-num">04</span> Content</div>
          <div class="field">
            <label for="content">Paste your story or article</label>
            <textarea id="content" placeholder="Once upon a time..."></textarea>
          </div>
        </section>

      </div>

      <!-- RIGHT: Output -->
      <div class="output-col">
        <div class="output-sticky">
          <div class="output-header">
            <span class="output-title">Generated markdown</span>
            <div class="output-actions">
              <button class="action-btn" id="copy-fm-btn">Copy frontmatter</button>
              <button class="action-btn primary" id="copy-all-btn">Copy all</button>
            </div>
          </div>
          <div class="output-box">
            <pre id="output"></pre>
          </div>
          <div class="output-footer">
            Paste into <a href="https://github.dev/KidsCollab/KidsCollab" target="_blank">github.dev</a> → correct folder → commit
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
